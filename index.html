<!DOCTYPE html>
<html lang="en">
	<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>love ya!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>

    /* -------- Global Reset -------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #0d0d11 url("images/bg3.png") center / cover no-repeat fixed;
      color: #a8a4b4;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      position: relative;
    }

    /* -------- Dark Overlay -------- */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 14, 0.82);
      z-index: 0;
    }

    /* -------- Layout Container -------- */
    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 1.5rem 10rem;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* -------- Header -------- */
    header {
      margin-bottom: 2.5rem;
      padding-top: 11.5rem;
    }

    .icon {
      font-size: 2.75rem;
      display: block;
      margin: 0 0 0.75rem;
    }

    /* -------- Typography -------- */
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: #ede9f5;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      font-size: 0.9rem;
      font-weight: 300;
      color: #7a7688;
      margin: 0 0 2.5rem;
      letter-spacing: 0.01em;
    }

    /* -------- Links -------- */
    a {
      color: #c2bbd8;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: #e8dfc0;
    }

    /* -------- Link List -------- */
    .links {
      margin: 0 0 3rem;
      list-style: none;
      padding-left: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .links > li {
      font-size: 0.95rem;
      color: #9c96aa;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(184, 174, 208, 0.07);
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .links > li:first-child {
      border-top: 1px solid rgba(184, 174, 208, 0.07);
    }

    .links > li .emoji {
      font-size: 0.85rem;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* -------- Writing Sub-list -------- */
    .writing-section {
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .writing-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding-bottom: 0.4rem;
    }

    .sublinks {
      list-style: none;
      padding-left: 1.5rem;
      margin: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sublinks li {
      font-size: 0.875rem;
      color: #7a7688;
      padding: 0.3rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sublinks li .emoji {
      font-size: 0.75rem;
    }

    /* -------- Blockquote -------- */
    blockquote {
      margin: 0.5rem 0 0;
      padding: 1.5rem 0 0;
      border-top: 1px solid rgba(184, 174, 208, 0.1);
      color: #5c5868;
      font-size: 0.825rem;
      font-weight: 300;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    blockquote a {
      color: #6e6880;
    }

    blockquote a:hover {
      color: #a89e8c;
    }

    /* -------- Responsive -------- */
    @media (max-width: 640px) {
      header {
        padding-top: 6rem;
      }
      h2 {
        font-size: 2rem;
      }
    }

    /* -------- Footer -------- */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 3.5rem 0 0;
      color: #3e3a4a;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
    }

  </style>
</head>

<body>
  <div class="page">

    <header>
      <span class="icon">👋</span>
    </header>

    <!-- Main Content -->
    <h2>I'm Long, like the adjective</h2>
    <p class="subtitle">Here, have a drink — 🥤🍷🍵 — I hope you enjoy your stay.</p>

    <ul class="links">
      <li><span class="emoji">✍️</span><a href="https://www.notion.so/Engineering-Blog-2bb250e457388054a468e7f04e8409b8?pvs=21">Engineering Blog</a></li>
      <li><span class="emoji">💻</span><a href="https://github.com/nguyenv119">GitHub</a></li>
      <li><span class="emoji">📸</span><a href="https://www.instagram.com/vlong_codes/">Instagram</a></li>
      <li><span class="emoji">🤝</span><a href="https://www.linkedin.com/in/nguyenv119/">LinkedIn</a></li>
      <li class="writing-section">
        <div class="writing-label"><span class="emoji">✍️</span>Writing</div>
        <ul class="sublinks">
          <li><span class="emoji">📝</span><a href="https://www.notion.so/nguyenv119/Writing-322250e457388052b711fb53e584fd9c?source=copy_link">General</a></li>
          <li><span class="emoji">💜</span><a href="https://www.notion.so/nguyenv119/Love-Poetry-2c7250e4573880ceb982c0836594fd66?source=copy_link">Love Poetry</a></li>
        </ul>
      </li>
    </ul>

    <blockquote>
      Periodic life update: thanks Mel Robbins for <a href="https://www.youtube.com/watch?v=P91b4civBxA">this</a>
    </blockquote>

    <!-- Footer -->
    <footer>
      built with care 💜
    </footer>

  </div>
</body>
</html>
