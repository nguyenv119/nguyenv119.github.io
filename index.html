<!DOCTYPE html>
<html lang="en">
	<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>love ya!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <style>

    /* -------- Global Reset -------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #0d0d11 url("images/bg3.png") center / cover no-repeat fixed;
      color: #a8a4b4;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      position: relative;
    }

    /* -------- Dark Overlay -------- */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 14, 0.82);
      z-index: 0;
    }

    /* -------- Layout Container -------- */
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.25rem 10rem;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* -------- Header -------- */
    header {
      margin-bottom: 1.5rem;
      padding-top: 11.5rem;
    }

    .icon {
      font-size: 3.5rem;
      display: block;
      margin: 0 0 0.5rem;
    }

    /* -------- Typography -------- */
    h1, h2, h3 {
      font-weight: 500;
      color: #e8e6ed;
    }

    h2 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    p {
      margin: 0.4rem 0 1.25rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #a8a4b4;
      margin: 0.5rem 0 1.75rem;
    }

    /* -------- Links -------- */
    a {
      color: #b8aed0;
      text-decoration: none;
      border-bottom: 1px solid rgba(184, 174, 208, 0.2);
      transition: color 0.2s ease, border-bottom-color 0.2s ease;
    }

    a:hover {
      color: #d4c8a6;
      border-bottom-color: #d4c8a6;
    }

    /* -------- Link List -------- */
    .links {
      margin: 0.5rem 0 2.5rem;
      list-style: none;
      padding-left: 0;
    }

    .links li {
      margin: 0.6rem 0;
      font-size: 1.05rem;
      transition: transform 0.15s ease;
    }

    .links li:hover {
      opacity: 0.8;
    }

    /* -------- Blockquote -------- */
    blockquote {
      border-top: 1px solid rgba(184, 174, 208, 0.15);
      border-bottom: 1px solid rgba(184, 174, 208, 0.15);
      padding: 1rem 0;
      margin: 1.5rem 0;
      color: #8a8696;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* -------- Responsive -------- */
    @media (max-width: 640px) {
      header {
        padding-top: 6rem;
      }
    }

    /* -------- Footer -------- */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 2.5rem 0 0;
      color: #5a5668;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

  </style>
</head>

<body>
  <div class="page">

    <header>
      <span class="icon">👋</span>
    </header>

    <!-- Main Content -->
    <h2>I'm Long, like the adjective</h2>
    <p class="subtitle">Here, have a drink — 🥤🍷🍵 — I hope you enjoy your stay.</p>

    <ul class="links">
      <li>✍️ <a href="https://www.notion.so/Engineering-Blog-2bb250e457388054a468e7f04e8409b8?pvs=21">Engineering Blog</a></li>
      <li>💻 <a href="https://github.com/nguyenv119">GitHub</a></li>
      <li>📸 <a href="https://www.instagram.com/vlong_codes/">Instagram</a></li>
      <li>🤝 <a href="https://www.linkedin.com/in/nguyenv119/">LinkedIn</a></li>
      <li>💜 <a href="https://www.notion.so/nguyenv119/Love-Poetry-2c7250e4573880ceb982c0836594fd66?source=copy_link">Love Poetry</a></li>
    </ul>

    <blockquote>
      Periodic life update: thanks Mel Robbins for <a href="https://www.youtube.com/watch?v=P91b4civBxA">this</a>
    </blockquote>

    <!-- Footer -->
    <footer>
      built with care 💜
    </footer>

  </div>
</body>
</html>
