<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>for you — Long Nguyen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/page.css">
  <style>
    .pw-gate {
      transition: opacity 0.5s ease;
    }
    .pw-gate.fading {
      opacity: 0;
      pointer-events: none;
    }
    .pw-form {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      margin-top: 2rem;
      max-width: 280px;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }
    .pw-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--cream-22);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      padding: 0.55rem 0;
      outline: none;
      transition: border-color 0.3s ease;
      width: 100%;
    }
    .pw-input::placeholder {
      color: var(--cream-22);
    }
    .pw-input:focus {
      border-bottom-color: var(--gold);
    }
    .pw-submit {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--cream-22);
      color: var(--cream-45);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 0.45rem 0;
      cursor: pointer;
      text-align: left;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .pw-submit:hover {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .pw-error {
      font-size: 0.72rem;
      font-weight: 300;
      font-style: italic;
      color: var(--cream-45);
      letter-spacing: 0.04em;
      min-height: 1.1em;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .pw-error.visible {
      opacity: 1;
    }
    #secret-msg {
      display: none;
    }
  </style>
</head>

<body>
  <div class="bg" style="background-image: url('../images/bg3.webp')" data-placeholder="../images/bg3-placeholder.webp" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="page">

    <!-- Password gate -->
    <div class="pw-gate" id="pw-gate">
      <div class="page-icon">🔒</div>
      <h1 class="page-title" style="font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 1.8rem;">for you</h1>
      <p class="page-subtitle">you know the word</p>

      <div class="pw-form">
        <input
          class="pw-input"
          id="pw-input"
          type="password"
          placeholder="..."
          autocomplete="off"
          spellcheck="false"
          aria-label="password"
        />
        <button class="pw-submit" id="pw-submit" type="button">enter →</button>
        <p class="pw-error" id="pw-error" aria-live="polite">that's not it</p>
      </div>
    </div>

    <!-- Secret message — decrypted and injected on correct password entry -->
    <div id="secret-msg"></div>

  </main>

  <script src="../js/bg-loader.js"></script>
  <script>
    (function () {
      // Message encrypted with AES-256-GCM, key derived via PBKDF2 from the password.
      // Plain text is never stored anywhere in this file.
      var SALT = '99sSlnz4UMQxnYz9sM2B0A==';
      var IV   = 'ApYS3KCHFfLvxxli';
      var CT   = 'TrsFYBmg0rQwfBtxD+VHXVZa16cB52RPQCORS7xgYmKJP2N0wx4g7T4p6idKQ2aDhBDGxmTj2FmmvbfQajxLmiyc63VWYi2INI/zX9F9VVRuEscc/4BdCeNl2Wyi3yooj4oT8j9YkkfG6RbbQxVV2GvaIlO63uAxpolNq9OKCzx77rsoGE2USMKr/XnxSjFT78SzzS2/F77UHn7bcdvuBjlNUsW8mJymsw/8sLOBCiAoo0fGDwFV/QGmpX4hZAu+fQpXYyaYlWuub2aX2H5QseK1nBgRLeteRKqV/BdqrwHxmkgaha8WjKiCKK/1ykSNX5NgEd6p4J1Fpz1wDJ9lmpwNjzEtoDhv+1j8pTKd/JZArH25rw4gRDEztRo1TpZiMo8P84JxBDeP2rjGQoqGCE/UBCp4Fb2fZYc7GtXnM++owvVPoYUBwFv18mLRwxEMhRezA/7b6TdkhIVxIEBoiX1WSmkIdPC/OO9XLGnu1pR6rZ9pYiV/bl0txv8yVp+nG6cgO/Y5jbJHo2FH4XGWRe8BLw/rT10HbXmlovMCYfjpih10kzz9VQ1T/2OGDzwVg5Vg6qWInI0zg2wBX5Eo1s9BR8bh+yGUmxHCaOYNIIBcklshgPXQl+RM0rpfFNCf7gL++nmsCRomzdewaLFX2XT5plf9QBFNOhqBwmm+OmN52K1dKUNpYU+GYHvnQe1rnwffgD3UGx2EG39/lLAUGIAshtRx1aIYUjvNtvEFjU6rNGTxpWkMLcC2wYxLJbsH0WmPqJx/XsMRhpSiggk2I3fA6/DwOpoYX+jAYRgUEqaX8htltg2Q5VImoO7lZFerXf97Nr2nET2ci1pRHM7aXWmLLD9Dpaukq39P4bTEQUJYeLy5fe/c1OcZj871RUoxt6xKxcEt+jiN3pS120BJ0ypNxzWprsBHy/Gbv6RFlF0NIX2L1ojDUIJbVeJLKHaa/8+RkLkI1Vg6DpXhfF54psFN5qAUpwVUrOgtUR0KWULFt7OlM1LAo0PSaK6v+Q6wIfGKho6MiTbL//ggNzLunBXlP2Yy3BxEjvFbwd5sjEwdzz3MlxLNYG8X4jkUXtd3VN5qgHou2e7ixTJcC+3q3J+8KwX1BwU7wuhCCqgt9Tg1xgAnzZsIjuDQ/QHdCZja3fQDHDkXAinKbg5K0HMvaAEW7vyQSm5toWgDBsK8UL0gw11b//30gij+sMEysPyOpLBWolSErPTpA21TGewqO9OWzKQiW/LIP4qM71oaIEE/13tbhE3wk6OXXMvzmOHGtuU1hCeDQWmib+lYZ4ctuRvUgezuaBGJ/gawVRgYz1U0bKjXW8k3uAVR5rgZ6O+3CuIk3qPcEiJDekKyGC3eOhFg1OsR7wVrGFrOgo1f73x255nGBdz0TPp/bDLzeIWHsihN5KFg0u2iXHfw5/WaqwktOy8iN8GAIe3NfmN/LAFBDrFwYgEMX9vyA1bdqRXlxzVG1lcK4nNeBPDKwm1jUKFoKMOOUGqnmHucFWz8RfonLqLYni312W58TIyVx+USWIMhD0dAKgR5KJrAIJP0vlX5ldFMbO+aquQ7bSwc3py2ZzDh1J2uOu6paWaOicuy9Iofw0dLLHubGUHOGBFZv87ebU0V5JYQLC4EsvPd/RB4XZoL90k2YraizshcKfhJo5ZvqVkjKUswGf/WrbCFNnr7tuZEL8HJWgsld2i/vXPlrpHybkdKvws5Tt2AlC8q0Lw3dtJ7A2CYdMfnpC1QOVhq6InmrLqGpmiAAkIJtxfBQMZ0Z0znbW3tUjivgG1NHRadx/QJzuQKPEgV9M3I06Wo4HKnFyWMQWtA7kMmf9vW6wDGtLYJ3iB+V4gbq0ehObUFj0bbbdRnyJIQCSM7CpYNvO0my/M2syOXzqS56iommR0jAzuqYt/Y2wPaozYtCTFdDiP4DlzWukhaVgbfsB7R4JJs60k/cLz8iRQc0gsQmtMwvdeSCQjVRFlw18       function b64ToBytes(b64) {
        return Uint8Array.from(atob(b64), function (c) { return c.charCodeAt(0); });
      }

      async function deriveKey(password, salt) {
        var keyMaterial = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
        );
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
      }

      var gate  = document.getElementById('pw-gate');
      var msg   = document.getElementById('secret-msg');
      var input = document.getElementById('pw-input');
      var btn   = document.getElementById('pw-submit');
      var errEl = document.getElementById('pw-error');

      async function attempt() {
        try {
          var key = await deriveKey(input.value, b64ToBytes(SALT));
          var plain = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv: b64ToBytes(IV) },
            key,
            b64ToBytes(CT)
          );
          var html = new TextDecoder().decode(plain);
          gate.classList.add('fading');
          gate.addEventListener('transitionend', function () {
            gate.style.display = 'none';
            msg.innerHTML = html;
            msg.style.display = 'block';
          }, { once: true });
        } catch (_) {
          errEl.classList.remove('visible');
          void errEl.offsetWidth;
          errEl.classList.add('visible');
          input.value = '';
          input.focus();
        }
      }

      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') attempt();
      });
    })();
  </script>
</body>
</html>
