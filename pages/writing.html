        <summary> Things I Kept Throwing Away (03/23/2026)</summary>
        <div class="toggle-content">
          <div class="poem">
            <div class="stanza">
              <div class="line">Bread arrives with every order, stale.</div>
              <div class="line">Mind elsewhere, I bin it on the way out.</div>
            </div>
            <div class="stanza">
              <div class="line">One day, I didn't.</div>
            </div>
            <div class="stanza">
              <div class="line">I ate it.</div>
              <div class="line">It didn't taste like much.</div>
              <div class="line">It tasted of everything.</div>
            </div>
          </div>
        </div>
